models:
  - ref: claude-bedrock
    type: model
    display_name: claude-bedrock
    name: claude-bedrock
    capabilities:
      - generate
    formats:
      - type: bedrock
    targets:
      - name: anthropic.claude-3-5-sonnet
        provider: bedrock-env
        config:
          max_tokens: 1024
          region: us-east-1
          type: bedrock
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@bedrock/claude-3-5-sonnet'
model_providers:
  - ref: bedrock-env
    type: bedrock
    display_name: bedrock-env
    name: bedrock-env
    config:
      auth:
        type: aws
        access_key_id: '{vault://env/aws-key-id}'
        secret_access_key: '{vault://env/aws-secret}'
        assume_role_arn: arn:aws:iam::123:role/bedrock
        role_session_name: kong-session
