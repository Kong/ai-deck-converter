models:
  - ref: prod-chat
    type: model
    display_name: prod-chat
    name: prod-chat
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-4o
        weight: 80
        provider: openai-env
        config:
          temperature: 0.6
          type: openai
      - name: claude-3-5
        weight: 20
        provider: anthropic-env
        config:
          type: anthropic
          version: "2023-06-01"
    policies:
      - ai-prompt-guard
    access:
      acls:
        allow:
          - premium
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@prod/prod-chat'
      balancer:
        algorithm: lowest-latency
model_providers:
  - ref: openai-env
    type: openai
    display_name: openai-env
    name: openai-env
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://env/openai-key}'
  - ref: anthropic-env
    type: anthropic
    display_name: anthropic-env
    name: anthropic-env
    config:
      auth:
        type: basic
        headers:
          - name: x-api-key
            value: '{vault://env/anthropic-key}'
mcp_servers:
  - ref: tools-mcp
    type: passthrough-listener
    display_name: tools-mcp
    name: tools-mcp
    config:
      route:
        paths:
          - /mcp/tools
      logging:
        payloads: false
        statistics: true
        audits: false
      url: https://tools.internal/mcp
agents:
  - ref: orchestrator
    type: a2a
    display_name: orchestrator
    name: orchestrator
    config:
      url: https://orchestrator.internal/a2a
      route:
        name: orch-route
        paths:
          - /agents/orch
      logging:
        payloads: false
        statistics: true
        max_payload_size: 1048576
policies:
  - ref: ai-prompt-guard
    type: ai-prompt-guard
    display_name: ai-prompt-guard
    name: ai-prompt-guard
    config:
      allow_patterns:
        - ^safe
consumers:
  - ref: app-svc
    display_name: app-svc
    name: app-svc
    type: api-key
    consumer_groups:
      - premium
    credentials:
      - ref: app-svc-credential-1
        display_name: app-svc-credential-1
        name: app-svc-credential-1
        type: api-key
        api_key: app-secret
consumer_groups:
  - ref: premium
    display_name: premium
    name: premium
vaults:
  - ref: env-vault
    type: env
    name: env-vault
    config:
      prefix: KONG_
