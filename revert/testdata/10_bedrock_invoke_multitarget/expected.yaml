models:
  - ref: titan-embed-text-v2
    type: model
    display_name: titan-embed-text-v2
    name: titan-embed-text-v2
    capabilities:
      - embeddings
    formats:
      - type: bedrock
    targets:
      - name: amazon.titan-embed-text-v2:0
        provider: bedrock-ai
        config:
          embeddings_normalize: true
          region: us-east-1
          type: bedrock
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@bedrock/titan-embed-text-v2'
  - ref: nova-canvas-image
    type: model
    display_name: nova-canvas-image
    name: nova-canvas-image
    capabilities:
      - image
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-canvas-v1:0
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@bedrock/nova-canvas'
  - ref: nova-sonic-audio
    type: model
    display_name: nova-sonic-audio
    name: nova-sonic-audio
    capabilities:
      - audio/speech
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-sonic-v1:0
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@bedrock/nova-sonic'
  - ref: nova-reel-video
    type: model
    display_name: nova-reel-video
    name: nova-reel-video
    capabilities:
      - video
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-reel-v1:1
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
          video_output_s3_uri: s3://kong/nova-reel/
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@bedrock/nova-reel'
model_providers:
  - ref: bedrock-ai
    type: bedrock
    display_name: bedrock-ai
    name: bedrock-ai
    config:
      auth:
        type: aws
        access_key_id: '{vault://ai/aws-access-key-id}'
        secret_access_key: '{vault://ai/aws-secret-access-key}'
