models:
  - type: model
    name: titan-embed-text-v2
    capabilities:
      - embeddings
    formats:
      - type: bedrock
    targets:
      - name: amazon.titan-embed-text-v2:0
        provider: bedrock-ai
        config:
          embeddings_normalize: true
          region: us-east-1
          type: bedrock
    config:
      route:
        model:
          path_aliases:
            - '@bedrock/titan-embed-text-v2'
      logging:
        payloads: false
        statistics: true
  - type: model
    name: nova-canvas-image
    capabilities:
      - image
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-canvas-v1:0
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
    config:
      route:
        model:
          path_aliases:
            - '@bedrock/nova-canvas'
      logging:
        payloads: false
        statistics: true
  - type: model
    name: nova-sonic-audio
    capabilities:
      - audio/speech
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-sonic-v1:0
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
    config:
      route:
        model:
          path_aliases:
            - '@bedrock/nova-sonic'
      logging:
        payloads: false
        statistics: true
  - type: model
    name: nova-reel-video
    capabilities:
      - video
    formats:
      - type: bedrock
    targets:
      - name: amazon.nova-reel-v1:1
        provider: bedrock-ai
        config:
          region: us-east-1
          type: bedrock
          video_output_s3_uri: s3://kong/nova-reel/
    config:
      route:
        model:
          path_aliases:
            - '@bedrock/nova-reel'
      logging:
        payloads: false
        statistics: true
model_providers:
  - type: bedrock
    name: bedrock-ai
    config:
      auth:
        type: aws
        access_key_id: '{vault://ai/aws-access-key-id}'
        secret_access_key: '{vault://ai/aws-secret-access-key}'
