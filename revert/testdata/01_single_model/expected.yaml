models:
  - type: model
    name: gpt-5-2
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2
        provider: openai-ai
        config:
          max_tokens: 1024
          temperature: 1
          type: openai
    config:
      response_streaming: allow
      model:
        alias: '@openai/gpt-5.2'
providers:
  - type: openai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
