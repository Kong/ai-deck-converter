models:
  - ref: gpt-5-2
    type: model
    display_name: gpt-5-2
    name: gpt-5-2
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2
        provider: openai-ai
        config:
          max_tokens: 1024
          temperature: 1
          type: openai
    config:
      logging:
        payloads: false
        statistics: true
      response_streaming: allow
      model:
        alias: '@openai/gpt-5.2'
model_providers:
  - ref: openai-ai
    type: openai
    display_name: openai-ai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
