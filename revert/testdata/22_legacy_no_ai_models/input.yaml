# A decK config from an older gateway version that predates the ai-models
# entity and the ai-model-selector plugin: ai-proxy-advanced routes only. The
# aliased target derives its model name from the alias, the alias-less target
# falls back to the route name — both silently, since absence of ai-models is
# normal here, not an inconsistency.
_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
      - name: openai-embeddings
        paths:
          - /ai/embeddings
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      response_streaming: allow
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          model:
            model_alias: '@openai/gpt-5.2'
            name: gpt-5.2
            options:
              max_tokens: 1024
              temperature: 1
            provider: openai
          route_type: llm/v1/chat
    route:
      name: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/embeddings
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          model:
            name: text-embedding-3-large
            provider: openai
          route_type: llm/v1/embeddings
    route:
      name: openai-embeddings
