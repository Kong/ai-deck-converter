models:
  - type: model
    name: gpt-5-2
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2
        provider: openai-ai
        config:
          type: openai
    config:
      route:
        model:
          path_aliases:
            - '@openai/gpt-5.2'
      logging:
        payloads: false
        statistics: true
  - type: model
    name: gpt-5-2-mini
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2-mini
        provider: openai-ai
        config:
          type: openai
    config:
      route:
        model:
          path_aliases:
            - '@openai/gpt-5.2-mini'
      logging:
        payloads: false
        statistics: true
model_providers:
  - type: openai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
