models:
  - ref: gpt-5-2
    type: model
    display_name: gpt-5-2
    name: gpt-5-2
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2
        provider: openai-ai
        config:
          type: openai
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@openai/gpt-5.2'
  - ref: gpt-5-2-mini
    type: model
    display_name: gpt-5-2-mini
    name: gpt-5-2-mini
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.2-mini
        provider: openai-ai
        config:
          type: openai
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@openai/gpt-5.2-mini'
model_providers:
  - ref: openai-ai
    type: openai
    display_name: openai-ai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
