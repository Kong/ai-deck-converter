models:
  - type: model
    name: openai-gpt-5-4
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.4
        provider: openai-ai
        config:
          type: openai
    access:
      identity_providers:
        - openid-connect-1
        - key-auth-1
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@openai/gpt-5.4'
model_providers:
  - type: openai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
identity_providers:
  - type: openid-connect
    name: openid-connect-1
    config:
      issuer: https://dev-123456.okta.com/oauth2/default
  - type: key-auth
    name: key-auth-1
    config:
      key_names:
        - x-api-key
