models:
  - ref: vertex-gemini-2-5-pro
    type: model
    display_name: vertex-gemini-2-5-pro
    name: vertex-gemini-2-5-pro
    capabilities:
      - generate
    formats:
      - type: gemini
    targets:
      - name: gemini-2.5-pro
        provider: gemini-ai
        config:
          gcp_environment:
            location_id: us-central1
            project_id: kong-vertex-project
          max_tokens: 4096
          temperature: 1
          type: gemini
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@vertex/gemini-2.5-pro'
  - ref: vertex-text-embedding-005
    type: model
    display_name: vertex-text-embedding-005
    name: vertex-text-embedding-005
    capabilities:
      - embeddings
    formats:
      - type: gemini
    targets:
      - name: text-embedding-005
        provider: gemini-ai
        config:
          gcp_environment:
            location_id: us-central1
            project_id: kong-vertex-project
          type: gemini
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@vertex/text-embedding-005'
model_providers:
  - ref: gemini-ai
    type: gemini
    display_name: gemini-ai
    name: gemini-ai
    config:
      auth:
        type: gcp
        service_account_json: '{vault://ai/gcp-service-account-json}'
