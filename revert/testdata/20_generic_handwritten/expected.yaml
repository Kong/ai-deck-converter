models:
  - ref: chat-v1
    type: model
    display_name: chat-v1
    name: chat-v1
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-4o
        provider: openai-secrets
        config:
          temperature: 0.2
          type: openai
    policies:
      - rate-limiting
    config:
      route:
        paths:
          - /llm
      logging:
        payloads: false
        statistics: true
model_providers:
  - ref: openai-secrets
    type: openai
    display_name: openai-secrets
    name: openai-secrets
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://secrets/openai-key}'
agents:
  - ref: billing-api
    type: http
    display_name: billing-api
    name: billing-api
    config:
      url: https://billing.internal:8443/v1
      route:
        name: billing-route
        paths:
          - /billing
policies:
  - ref: http-log
    type: http-log
    display_name: http-log
    name: http-log
    global: true
    config:
      http_endpoint: https://logs.internal/ingest
  - ref: rate-limiting
    type: rate-limiting
    display_name: rate-limiting
    name: rate-limiting
    config:
      minute: 60
      policy: local
vaults:
  - ref: secrets
    type: env
    name: secrets
    config:
      prefix: SECRET_
