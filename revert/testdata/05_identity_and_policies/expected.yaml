models:
  - ref: guarded-gpt
    type: model
    display_name: guarded-gpt
    name: guarded-gpt
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-4o
        provider: openai-env
        config:
          type: openai
    policies:
      - ai-prompt-guard
      - http-log
    access:
      acls:
        allow:
          - premium-users
        deny:
          - banned
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@openai/guarded-gpt'
model_providers:
  - ref: openai-env
    type: openai
    display_name: openai-env
    name: openai-env
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://env/openai-key}'
policies:
  - ref: rate-limiting
    type: rate-limiting
    display_name: rate-limiting
    name: rate-limiting
    global: true
    config:
      minute: 1000
      policy: local
  - ref: http-log
    type: http-log
    display_name: http-log
    name: http-log
    config:
      http_endpoint: https://logs.internal/ingest
  - ref: ai-prompt-guard
    type: ai-prompt-guard
    display_name: ai-prompt-guard
    name: ai-prompt-guard
    config:
      allow_patterns:
        - ^safe
consumers:
  - ref: gregs-dev
    display_name: gregs-dev
    name: gregs-dev
    type: api-key
    custom_id: dev-001
    consumer_groups:
      - premium-users
    policies:
      - http-log
    credentials:
      - ref: gregs-dev-credential-1
        display_name: gregs-dev-credential-1
        name: gregs-dev-credential-1
        type: api-key
        ttl: 3600
    labels:
      tier: gold
consumer_groups:
  - ref: premium-users
    display_name: premium-users
    name: premium-users
vaults:
  - ref: env-vault
    type: env
    name: env-vault
    description: Environment secrets
    config:
      prefix: KONG_
