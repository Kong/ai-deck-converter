agents:
  - type: a2a
    name: booking-agent
    config:
      url: https://booking-agent.internal:8443/a2a
      route:
        name: booking-route
        paths:
          - /agents/booking
        methods:
          - POST
      max_request_body_size: 1048576
      logging:
        payloads: false
        statistics: true
        max_payload_size: 524288
  - type: http
    name: weather-agent
    policies:
      - key-auth
    config:
      url: https://weather.internal/api
      route:
        name: weather-route
        paths:
          - /agents/weather
policies:
  - type: key-auth
    name: key-auth
    config:
      key_names:
        - apikey
