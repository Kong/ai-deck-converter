agents:
  - ref: booking-agent
    type: a2a
    display_name: booking-agent
    name: booking-agent
    config:
      url: https://booking-agent.internal:8443/a2a
      route:
        name: booking-route
        paths:
          - /agents/booking
        methods:
          - POST
      max_request_body_size: 1048576
      logging:
        payloads: false
        statistics: true
        max_payload_size: 524288
  - ref: weather-agent
    type: http
    display_name: weather-agent
    name: weather-agent
    policies:
      - key-auth
    access:
      acls:
        allow:
          - forecast-users
    config:
      url: https://weather.internal/api
      route:
        name: weather-route
        paths:
          - /agents/weather
policies:
  - ref: key-auth
    type: key-auth
    display_name: key-auth
    name: key-auth
    config:
      key_names:
        - apikey
