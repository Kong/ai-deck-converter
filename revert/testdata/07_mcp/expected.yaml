mcp_servers:
  - type: conversion-listener
    name: flights-mcp
    config:
      route:
        paths:
          - /mcp/flights
      logging:
        payloads: false
        statistics: true
        audits: true
      max_request_body_size: 8388608
      server:
        forward_client_headers: true
        timeout: 10000
      auth:
        default_tool_acls:
          allow:
            - premium
    tools:
      - name: searchFlights
        description: Search available flights
        method: GET
        path: /flights
        scheme: https
        host: flights.internal
      - name: bookFlight
        description: Book a flight
        method: POST
        path: /flights/book
        acls:
          allow:
            - agents
  - type: passthrough-listener
    name: vendor-mcp
    config:
      route:
        paths:
          - /mcp/vendor
      logging:
        payloads: false
        statistics: true
        audits: false
    upstream_url: https://vendor-mcp.example.com/mcp
