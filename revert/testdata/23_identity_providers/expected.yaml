models:
  - ref: openai-gpt-5-4
    type: model
    display_name: openai-gpt-5-4
    name: openai-gpt-5-4
    capabilities:
      - generate
    formats:
      - type: openai
    targets:
      - name: gpt-5.4
        provider: openai-ai
        config:
          type: openai
    access:
      identity_providers:
        - openid-connect-1
    config:
      logging:
        payloads: false
        statistics: true
      model:
        alias: '@openai/gpt-5.4'
model_providers:
  - ref: openai-ai
    type: openai
    display_name: openai-ai
    name: openai-ai
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: '{vault://ai/openai-token}'
identity_providers:
  - ref: openid-connect-1
    type: openid-connect
    display_name: openid-connect-1
    name: openid-connect-1
    config:
      issuer: https://dev-123456.okta.com/oauth2/default
