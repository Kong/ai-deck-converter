  - name: AI Gateway Vaults
    description: API related to the management of AI Gateway vaults for storing secrets.
  - name: AI Gateway Agents
    description: AI Agents registered with the AI Gateway.
  - name: AI Gateway Consumers
    description: >-
      Individual consumers with credentials and group memberships for AI Gateway
      access control.
  - name: AI Gateway Consumer Groups
    description: >-
      Consumer groups for applying rate-limiting and access policies to AI
      Gateway traffic.
  - name: AI Gateway Models
    description: >-
      Models that define routing, capabilities, and backend targets for the AI
      Gateway.
  - name: AI Gateway Policies
    description: >-
      Policies that control security, rate-limiting, and guardrail behavior for
      the AI Gateway.
  - name: AI Gateway MCP Servers
    description: MCP Servers that expose tools for AI Gateway integrations.
  - name: AI Gateway Providers
    description: >-
      Providers that define the backend AI service connections for the AI
      Gateway.
