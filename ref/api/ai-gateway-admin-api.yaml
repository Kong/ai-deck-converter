          $ref: '#/components/schemas/AIGatewayModelBalancerConfig'
      additionalProperties: false
      required:
        - route
        - model
    AIGatewayModelBalancerConfig:
      description: >-
        Configuration for a model's load balancer when multiple target models
        are configured.
      discriminator:
        propertyName: algorithm
        mapping:
          consistent-hashing: '#/components/schemas/AIGatewayModelBalancerConsistentHashingConfig'
          least-connections: '#/components/schemas/AIGatewayModelBalancerLeastConnectionsConfig'
          lowest-latency: '#/components/schemas/AIGatewayModelBalancerLowestLatencyConfig'
          lowest-usage: '#/components/schemas/AIGatewayModelBalancerLowestUsageConfig'
          priority: '#/components/schemas/AIGatewayModelBalancerPriorityConfig'
          round-robin: '#/components/schemas/AIGatewayModelBalancerRoundRobinConfig'
          semantic: '#/components/schemas/AIGatewayModelBalancerSemanticConfig'
      oneOf:
        - $ref: '#/components/schemas/AIGatewayModelBalancerConsistentHashingConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerLeastConnectionsConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerLowestLatencyConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerLowestUsageConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerPriorityConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerRoundRobinConfig'
        - $ref: '#/components/schemas/AIGatewayModelBalancerSemanticConfig'
    AIGatewayModelBalancerConsistentHashingConfig:
      type: object
      properties:
        connect_timeout:
          type: integer
          default: 60000
          maximum: 2147483646
          minimum: 1
        fail_timeout:
          description: >-
            The period of time (in milliseconds) the target will be considered
            unavailable after the number of unsuccessful attempts reaches
            `max_fails`.
          type: integer
          default: 10000
          maximum: 2147483646
          minimum: 1
        failover_criteria:
          description: >-
            Specifies in which cases an upstream response should be failover to
            the next target. Each option in the array is equivalent to the
            function of
            https://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_next_upstream
          type: array
          items:
            type: string
            enum:
              - error
              - http_403
              - http_404
              - http_429
              - http_500
              - http_502
              - http_503
              - http_504
              - invalid_header
              - non_idempotent
              - timeout
          default:
            - error
            - timeout
        max_fails:
          description: >-
            Number of unsuccessful attempts to communicate with a target that
            should occur in the duration defined by `fail_timeout` before the
            target is considered unavailable. The zero value disables the
            circuit breaker. What is considered an unsuccessful attempt is
            defined by `failover_criteria`. Note the cases of `error`, `timeout`
            and `invalid_header` are always considered unsuccessful attempts,
            while the cases of `http_403` and `http_404` are never considered
            unsuccessful attempts.
          type: integer
          default: 0
          maximum: 32767
          minimum: 0
        read_timeout:
          type: integer
          default: 60000
          maximum: 2147483646
          minimum: 1
        retries:
          description: The number of retries to execute upon failure to proxy.
          type: integer
          default: 5
          maximum: 32767
          minimum: 0
        slots:
          description: The number of slots in the load balancer algorithm.
          type: integer
          default: 10000
          maximum: 65536
          minimum: 10
        write_timeout:
          type: integer
          default: 60000
          maximum: 2147483646
          minimum: 1
        algorithm:
          type: string
          enum:
            - consistent-hashing
        hash_on_header:
          description: The header to use for consistent-hashing.
          type: string
          default: X-Kong-LLM-Request-ID
      required:
        - algorithm
