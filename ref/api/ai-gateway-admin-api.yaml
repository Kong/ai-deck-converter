          type: string
          default: allow
          enum:
            - allow
            - always
            - deny
        max_request_body_size:
          description: Maximum size of request body to parse. Set to 0 for unlimited.
          type: integer
          default: 8388608
        model:
          type: object
          additionalProperties: false
          properties:
            alias:
              description: >-
                An optional alias for the model, used to select the target
                virtual model when passed in the "model" parameter of the
                request body.
              type: string
