    AwsSecretsManagerVault:
      type: object
      properties:
        name:
          description: >
            A user-defined unique identifier for this vault instance, used as a
            stable human-readable reference.

            The name is used to load the right Vault configuration and
            implementation when referencing secrets with the other entities.
          type: string
          example: my-env-vault
        description:
          description: The description of the Vault.
          type: string
          example: This vault is used to retrieve redis database access credentials
        labels:
          $ref: '#/components/schemas/PublicLabels'
        managed_by:
          $ref: '#/components/schemas/ManagedBy'
        type:
          type: string
          enum:
            - aws
        config:
          type: object
          properties:
            base64_decode:
              description: >
                Decode all secrets in this vault as base64. Useful for binary
                data.

                If some of the secrets in the vault are not base64-encoded, an
                error will occur when using them.

                We recommend creating a separate vault for base64 secrets.
              type: boolean
            neg_ttl:
              description: >
                Time-to-live (in seconds) for caching failed secret lookups.

                A value of 0 disables negative caching. Kong will retry fetching
                the secret after neg_ttl expires.
              type: integer
              default: 0
            resurrect_ttl:
              description: >
                Time (in seconds) that secrets remain in use after expiration
                (config.ttl ends).

                Useful if the vault is unreachable or the secret is deleted but
                not yet replaced.

                Kong continues to retry for resurrect_ttl seconds before giving
                up.

                The default is ~3 years to support uninterrupted service during
                outages.
              type: integer
              default: 100000000
            ttl:
              description: >
                Time-to-live (in seconds) for a cached secret. A value of 0
                disables rotation.

                For non-zero values, use a minimum of 60 seconds.
              type: integer
              default: 0
            assume_role_arn:
              description: >
                The ARN of the role to assume when retrieving secrets from AWS
                Secrets Manager.
              type: string
            endpoint_url:
              description: >
                The endpoint URL of the AWS Secrets Manager service.

                If not specified, the default is
                https://secretsmanager.{region}.amazonaws.com.

                You can override this by specifying a complete URL including the
                http/https scheme.
              type: string
            region:
              description: The AWS region where your vault is located.
              type: string
              example: us-east-1
            role_session_name:
              description: The session name used when assuming a role.
              type: string
              default: KongVault
            sts_endpoint_url:
              description: >
                A custom STS endpoint URL used for IAM role assumption.

                Overrides the default https://sts.amazonaws.com or regional
                variant https://sts.<region>.amazonaws.com.

                Include the full http/https scheme. Only specify this if using a
                private VPC endpoint for STS.
              type: string
          required:
            - role_session_name
          title: AwsSecretsManagerVaultConfig
      required:
        - name
        - type
        - config
