    CreateAIGatewayAgentRequest:
      type: object
      properties:
        display_name:
          description: The display name for this agent.
          type: string
          example: Kong Air Flight Booking Agent
        name:
          description: >-
            A user-defined unique identifier for this agent, used as a stable
            human-readable reference.
          type: string
          example: kongair-flight-booking-agent
        enabled:
          description: Whether the Agent is enabled.
          type: boolean
          example: true
          default: true
        type:
          description: The type of the agent.
          type: string
          example: a2a
          enum:
            - a2a
            - http
        policies:
          $ref: '#/components/schemas/AIGatewayPolicyReferences'
        acls:
          $ref: '#/components/schemas/AIGatewayACLS'
        config:
          description: >-
            Configuration for the agent. The structure varies depending on the
            agent type.
          type: object
          additionalProperties: false
          properties:
            url:
              description: >
                Helper field to set protocol, host, port and path of the
                upstream A2A Agent using a URL.

                This is the same as a Kong Gateway Service URL:
                ${scheme}://${host}:${port}/${path}
              type: string
              format: uri
              example: 'https://booking-agent.internal.kongair.com'
            route:
              $ref: '#/components/schemas/AIGatewayRouteConfig'
            max_request_body_size:
              description: Maximum size of request body to parse. Set to 0 for unlimited.
              type: integer
              default: 8388608
            logging:
              description: Configuration for AI Gateway logging.
              type: object
              additionalProperties: false
              properties:
                payloads:
                  type: boolean
                  default: false
                statistics:
                  type: boolean
                  default: true
                max_payload_size:
                  description: >-
                    Maximum size in bytes for logged request/response payloads.
                    Payloads exceeding this size will be truncated.
                  type: integer
                  example: 524288
                  default: 1048576
        labels:
          $ref: '#/components/schemas/PublicLabels'
        managed_by:
          $ref: '#/components/schemas/ManagedBy'
      additionalProperties: true
      required:
        - display_name
        - name
        - type
