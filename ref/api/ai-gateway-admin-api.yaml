            outages.
          type: integer
          default: 100000000
        ttl:
          description: >
            Time-to-live (in seconds) for a cached secret. A value of 0 disables
            rotation.

            For non-zero values, use a minimum of 60 seconds.
          type: integer
          default: 0
        host:
          description: The hostname of your HashiCorp vault.
          type: string
        port:
          description: The port number of your HashiCorp vault.
          type: integer
        mount:
          description: The mount point.
          type: string
          default: secret
        kv:
          description: The secrets engine version.
          type: string
          default: v1
          enum:
            - v1
            - v2
        protocol:
          description: The protocol to connect with.
          type: string
          default: https
          enum:
            - http
            - https
        ssl_verify:
          description: Whether to verify the TLS certificate of the vault when connecting.
          type: boolean
          default: true
        namespace:
          description: >-
            Namespace for the Vault. Vault Enterprise requires a namespace to
            connect successfully.
          type: string
        auth_method:
          type: string
          enum:
            - aws_iam
        role:
          description: The role to use for AWS IAM auth.
          type: string
        region:
          description: The AWS region for auth.
          type: string
        login_path:
          description: The login path for AWS auth in HashiCorp Vault.
          type: string
          default: /v1/auth/aws/login
        access_key_id:
          description: >
            The AWS access key ID for IAM auth. If not provided, the default
            credentials provider chain is used.

            If set, `secret_access_key` must also be set.
          type: string
        secret_access_key:
          description: >
            The AWS secret access key for IAM auth. If not provided, the default
            credentials provider chain is used.

            If set, `access_key_id` must also be set.
          type: string
          writeOnly: true
        sts_endpoint_url:
          description: >
            The AWS STS endpoint URL used by Kong Gateway when signing the
            GetCallerIdentity request for AWS IAM authentication.

            If not provided, defaults to the standard STS endpoint for the
            specified region.

            This setting only affects the STS endpoint that Kong Gateway itself
            contacts -

            it does not influence which STS endpoint HashiCorp Vault uses on its
            side.
          type: string
        assume_role_arn:
          description: |
            The ARN of the role to assume for AWS IAM authentication.
            If set, `role_session_name` must also be set.
          type: string
        role_session_name:
          description: >
            The session name to use when assuming a role for AWS IAM
            authentication.

            If set, `assume_role_arn` must also be set.
          type: string
      required:
        - host
        - port
        - mount
        - auth_method
        - role
        - region
