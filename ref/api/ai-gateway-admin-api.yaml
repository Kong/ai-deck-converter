    AIGatewayMCPTool:
      description: 'A tool exposed by the MCP Server, mapped to a backend HTTP endpoint.'
      type: object
      properties:
        acls:
          description: >
            Access control rules for allowing or denying consumer groups access
            to this tool.

            When configured, these will override the default access control
            rules defined on the MCP Server.
          allOf:
            - $ref: '#/components/schemas/AIGatewayACLS'
        annotations:
          $ref: '#/components/schemas/AIGatewayMCPToolAnnotations'
        description:
          description: A description of what the tool does.
          type: string
          example: Search for available flights
        headers:
          $ref: '#/components/schemas/AIGatewayMCPToolHeaders'
        host:
          description: >-
            The host of the exported API, which must match the route's hosts. It
            should be the route's host. By default, Kong will extract the host
            from API configuration. If the configured host is wildcard, this
            field is required.
          type: string
        name:
          description: >-
            Tool identifier. In passthrough-listener mode, used to match remote
            MCP Server tools for ACL enforcement. In other modes, it is also
            used as the tool name (overrides annotations.title if present).
          type: string
        method:
          description: >-
            The method of the exported API, which must match the route's
            methods.
          type: string
          enum:
            - DELETE
            - GET
            - PATCH
            - POST
            - PUT
        path:
          description: >-
            The path of the exported API, which must match the route's paths.
            Path not starting with '/' are treated as relative path and the
            route path will be added as the prefix. By default, Kong will
            extract the path from API configuration.
          type: string
        query:
          $ref: '#/components/schemas/AIGatewayMCPToolQuery'
        request_body:
          $ref: '#/components/schemas/AIGatewayMCPToolRequestBody'
        responses:
          $ref: '#/components/schemas/AIGatewayMCPToolResponses'
        scheme:
          description: >-
            The scheme of the exported API. By default, Kong will extract the
            scheme from API configuration. If the configured scheme is not
            expected, this field can be used to override it.
          type: string
          enum:
            - http
            - https
        parameters:
          $ref: '#/components/schemas/AIGatewayMCPToolParameters'
      additionalProperties: false
      required:
        - description
        - method
    AIGatewayMCPToolAnnotations:
      type: object
      properties:
        destructive_hint:
          description: 'If true, the tool may perform destructive updates'
          type: boolean
        idempotent_hint:
          description: 'If true, repeated calls with same args have no additional effect'
          type: boolean
        open_world_hint:
          description: 'If true, tool interacts with external entities'
          type: boolean
        read_only_hint:
          description: 'If true, the tool does not modify its environment'
          type: boolean
        title:
          description: Human-readable title for the tool
          type: string
      additionalProperties: false
    AIGatewayMCPToolHeaders:
      description: >-
        The headers of the exported API. By default, Kong will extract the
        headers from API configuration. If the configured headers are not
        exactly matched, this field is required.
      type: object
      additionalProperties: true
    AIGatewayMCPToolQuery:
      description: >-
        The query arguments of the exported API. If the generated query
        arguments are not exactly matched, this field is required.
      type: object
      additionalProperties: true
    AIGatewayMCPToolRequestBody:
      description: >-
        The API requestBody specification defined in OpenAPI JSON format. For
        example,
        '{"content":{"application/x-www-form-urlencoded":{"schema":{"type":"object","properties":{"color":{"type":"array","items":{"type":"string"}}}}}}}'.
        See
        https://swagger.io/docs/specification/v3_0/describing-request-body/describing-request-body/
        for more details. Note that `$ref` is not supported.
      type: object
      additionalProperties: true
    AIGatewayMCPToolResponses:
      description: >-
        The API responses specification defined in OpenAPI JSON format. This
        specification will be used to validate the upstream response and map it
        back to the structuredOutput. For example,
        '{"200":{"content":{"application/json":{"schema":{"type":"object","properties":{"result":{"type":"string"}}}}}}}}'.
        See https://swagger.io/docs/specification/v3_0/describing-responses/ for
        more details. Only one non-error (status code < 400) response is
        supported. Note that `$ref` is not supported.
      type: object
      additionalProperties: true
    AIGatewayMCPToolParameters:
      type: array
      items:
        $ref: '#/components/schemas/AIGatewayMCPToolParameter'
    AIGatewayMCPToolParameter:
      description: >-
        An API parameter specification defined in OpenAPI JSON format. For
        example, '[{"name": "city", "in": "query", "description": "Name of the
        city to get the weather for", "required": true, "schema": {"type":
        "string"}}]'. See
        https://swagger.io/docs/specification/v3_0/describing-parameters/ for
        more details.
      type: object
      properties:
        name:
          description: The name of the parameter.
          type: string
          example: origin
        in:
          description: The location of the parameter in the request.
          type: string
          example: query
          enum:
            - query
            - path
            - header
            - body
        description:
          description: A description of the parameter.
          type: string
          example: The origin airport code.
        required:
          description: Whether this parameter is required.
          type: boolean
          example: true
        schema:
          description: >-
            JSON Schema definition for the parameter value. See
            https://swagger.io/docs/specification/v3_0/describing-parameters/#schema-vs-content
            for more details.
          type: object
          additionalProperties: true
      additionalProperties: false
      required:
        - name
        - in
