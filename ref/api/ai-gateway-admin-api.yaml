      type: object
      properties:
        display_name:
          description: The display name for this policy instance.
          type: string
          example: My Cool AI PII Sanitizer Policy
        name:
          description: >-
            A user-defined unique identifier for this policy instance, used as a
            stable human-readable reference.
          type: string
          example: ai-pii-sanitizer-1234
        type:
          description: >
            The type of the Policy. This is equivalent to the Kong 3 plugin
            name.

            Some examples are: 'ai-sanitizer', 'ai-prompt-guard', and
            'openid-connect'.

            Note: Plugins have been renamed to Policies in Kong AI Gateway.
            Policy types and configuration documentation can be found in the
            [Developer Docs](https://developer.konghq.com/plugins/).
          type: string
          example: ai-sanitizer
        enabled:
          description: Whether the policy is enabled.
          type: boolean
          example: true
          default: true
        global:
          description: Whether the policy is globally applied to all resources.
          type: boolean
          example: false
          default: false
        config:
          description: >
            Configuration for the policy. This is equivalent to the Kong 3
            plugin configuration.

            Note: Plugins have been renamed to Policies in Kong AI Gateway.
            Policy types and configuration documentation can be found in the
            [Developer Docs](https://developer.konghq.com/plugins/).
          type: object
          example:
            anonymize:
              - phone
              - creditcard
            stop_on_error: true
          additionalProperties: true
        labels:
          $ref: '#/components/schemas/PublicLabels'
        managed_by:
          $ref: '#/components/schemas/ManagedBy'
      additionalProperties: false
      required:
