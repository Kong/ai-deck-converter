            This field is
            [referenceable](https://developer.konghq.com/gateway/entities/vault/#how-do-i-reference-secrets-stored-in-a-vault).
          type: string
          x-referenceable: true
      additionalProperties: false
      required:
        - type
      title: AIGatewayRedisAWSAuthentication
    AIGatewayRedisAzureAuthentication:
      description: >-
        Azure specific configs for connecting to a Cloud Provider's redis
