      title: HashiCorpVaultConfig
    HashiCorpVaultTokenConfig:
      type: object
      properties:
        base64_decode:
          description: >
            Decode all secrets in this vault as base64. Useful for binary data.

            If some of the secrets in the vault are not base64-encoded, an error
            will occur when using them.

            We recommend creating a separate vault for base64 secrets.
          type: boolean
        neg_ttl:
          description: >
            Time-to-live (in seconds) for caching failed secret lookups.

            A value of 0 disables negative caching. Kong will retry fetching the
            secret after neg_ttl expires.
          type: integer
          default: 0
        resurrect_ttl:
          description: >
            Time (in seconds) that secrets remain in use after expiration
            (config.ttl ends).

            Useful if the vault is unreachable or the secret is deleted but not
            yet replaced.

            Kong continues to retry for resurrect_ttl seconds before giving up.

            The default is ~3 years to support uninterrupted service during
            outages.
          type: integer
          default: 100000000
        ttl:
          description: >
            Time-to-live (in seconds) for a cached secret. A value of 0 disables
            rotation.

