          type: string
          x-referenceable: true
        cache_name:
          description: >
            The name of the AWS Elasticache cluster.

            This field is
            [referenceable](https://developer.konghq.com/gateway/entities/vault/#how-do-i-reference-secrets-stored-in-a-vault).
          type: string
          x-referenceable: true
        is_serverless:
          description: This flag specifies whether the cluster is serverless.
          type: boolean
          default: true
        region:
          description: >
            The region of the AWS ElastiCache cluster.

            This field is
            [referenceable](https://developer.konghq.com/gateway/entities/vault/#how-do-i-reference-secrets-stored-in-a-vault).
          type: string
          x-referenceable: true
        role_session_name:
