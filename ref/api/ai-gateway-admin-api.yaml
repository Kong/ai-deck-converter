components:
  parameters:
    AIGatewayAgentId:
      name: agentId
      in: path
      required: true
      description: The unique ID of the AI Gateway agent.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayConsumerCredentialId:
      name: credentialId
      in: path
      required: true
      description: The unique ID of the AI Gateway consumer credential.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayConsumerGroupId:
      name: consumerGroupId
      in: path
      required: true
      description: The unique ID of the AI Gateway Consumer Group.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayConsumerId:
      name: consumerId
      in: path
      required: true
      description: The unique ID of the AI Gateway consumer.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayDataPlaneCertificateId:
      name: certificateId
      in: path
      required: true
      description: The unique ID of the DataPlane Certificate.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayDataPlaneNodeId:
      name: dataPlaneNodeId
      in: path
      required: true
      description: The unique ID of the AI Gateway DataPlane Node.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayId:
      name: gatewayId
      in: path
      required: true
      description: The unique ID of the AI Gateway.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayMcpServerId:
      name: mcpServerId
      in: path
      required: true
      description: The unique ID of the MCP Server.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayModelId:
      name: modelId
      in: path
      required: true
      description: The unique ID of the AI Gateway model.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayPolicyId:
      name: policyId
      in: path
      required: true
      description: The unique ID of the AI Gateway policy.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayProviderId:
      name: providerId
      in: path
      required: true
      description: The unique ID of the AI Gateway provider.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    AIGatewayVaultId:
      name: vaultId
      in: path
      required: true
      description: The unique ID of the AI Gateway Vault.
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        $ref: '#/components/schemas/UUID'
    PageAfter:
      name: 'page[after]'
      description: >-
        Request the next page of data, starting with the item after this
        parameter.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: >-
        The maximum number of items to include per page. The last page of a
        collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
  schemas:
    CreateAIGatewayRequest:
      type: object
      properties:
        name:
          description: The name of the AI Gateway.
          type: string
          example: My AI Gateway
        description:
          description: The description of the AI Gateway.
          type: string
          example: An AI Gateway for my organization.
        labels:
          $ref: '#/components/schemas/PublicLabels'
      additionalProperties: true
      required:
        - name
    UpdateAIGatewayRequest:
      type: object
      properties:
        name:
          description: The name of the AI Gateway.
          type: string
          example: My AI Gateway
        description:
          description: The description of the AI Gateway.
          type: string
          example: An AI Gateway for my organization.
        labels:
          $ref: '#/components/schemas/PublicLabels'
      additionalProperties: true
      required:
        - name
    AIGateway:
      type: object
      properties:
        name:
          description: The name of the AI Gateway.
          type: string
          example: My AI Gateway
        description:
          description: The description of the AI Gateway.
          type: string
          example: An AI Gateway for my organization.
        labels:
          $ref: '#/components/schemas/PublicLabels'
        id:
          $ref: '#/components/schemas/UUID'
        endpoints:
          description: Object containing AI Gateway access endpoints.
          type: object
          additionalProperties: false
          properties:
            configuration:
              description: Configuration Endpoint.
              type: string
              format: url
              example: 'https://acfe5f253f.cp.konghq.com'
              readOnly: true
            telemetry:
              description: Telemetry Endpoint.
              type: string
              format: url
              example: 'https://acfe5f253f.tp0.konghq.com'
              readOnly: true
          required:
            - configuration
            - telemetry
        config_hash:
          description: >
            The hash of the latest configuration for the gateway. Every change
            to an entity

            under this gateway will result in a new config_hash being generated.

            The config hash can be used to verify if the config hash of an AI
            Gateway

            node is up to date with the AI Gateway. The config hash will be the
            same if they are in sync.
          type: string
          readOnly: true
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: true
      required:
        - name
        - id
        - endpoints
        - created_at
        - updated_at
    CreateAIGatewayDataPlaneCertificateRequest:
      type: object
      properties:
        cert:
          description: JSON escaped string of the certificate.
          type: string
        title:
          description: A human-readable name for the certificate.
          type: string
        description:
          description: An optional description of the certificate.
          type: string
      additionalProperties: false
      required:
        - cert
        - title
    AIGatewayDataPlaneClientCertificate:
      type: object
      properties:
        cert:
          description: JSON escaped string of the certificate.
          type: string
        title:
          description: A human-readable name for the certificate.
          type: string
        description:
          description: An optional description of the certificate.
          type: string
        id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - cert
        - title
        - id
        - created_at
        - updated_at
    AIGatewayDataPlaneNode:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        version:
          type: string
        hostname:
          type: string
        last_ping:
          type: integer
        type:
          type: string
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        config_hash:
          description: The hash of the configuration applied by the node.
          type: string
          readOnly: true
        compatibility_status:
          type: object
          additionalProperties: false
          properties:
            state:
              type: string
            issues:
              type: array
              items:
                $ref: '#/components/schemas/AIGatewayDataPlaneNodeCompatibilityIssue'
      additionalProperties: false
      required:
        - id
        - version
        - hostname
        - last_ping
        - type
        - created_at
        - updated_at
        - compatibility_status
    AIGatewayDataPlaneNodeCompatibilityIssue:
      type: object
      properties:
        code:
          description: The compatibility issue code.
          type: string
        severity:
          description: The severity of the issue.
          type: string
        description:
          description: The description of the issue.
          type: string
        resolution:
