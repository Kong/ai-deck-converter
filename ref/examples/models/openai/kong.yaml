    name: openai-batches
  config:
    balancer:
      algorithm: round-robin
    llm_format: openai
    genai_category: text/generation
    targets:
      - route_type: llm/v1/batches
        auth:
          header_name: api-key
          header_value: "{vault://ai/azure-openai-key}"
        model:
          # Placeholder — Azure's batch endpoint is workspace-scoped, not
          # deployment-scoped, so azure_deployment_id is intentionally absent.
          provider: azure
          name: batch-api
          options:
            azure_instance: kong-az-east
            azure_api_version: "2024-10-01-preview"


