_format_version: "3.0"

services:
- name: ai-gateway
  url: http://ai-gateway.upstream.local
  routes:
    - name: openai-chat
      paths:
        - /ai/chat/completions
      methods:
        - POST
      strip_path: false
    - name: openai-responses
      paths:
        - /ai/responses
      methods:
        - POST
      strip_path: false
    - name: openai-realtime
      paths:
        - /ai/realtime
      methods:
        - GET
        - POST
      strip_path: false
    - name: openai-embeddings
      paths:
        - /ai/embeddings
      methods:
        - POST
      strip_path: false
    - name: openai-images
      paths:
        - /ai/images/generations
      methods:
        - POST
      strip_path: false
    - name: openai-audio-speech
      paths:
        - /ai/audio/speech
      methods:
        - POST
      strip_path: false
    - name: openai-audio-transcribe
      paths:
        - /ai/audio/transcriptions
      methods:
        - POST
      strip_path: false
    - name: openai-audio-translate
      paths:
        - /ai/audio/translations
      methods:
        - POST
      strip_path: false
    - name: openai-videos
      paths:
        - /ai/videos
      methods:
        - GET
        - POST
        - DELETE
      strip_path: false
    - name: openai-batches
      paths:
        - /ai/batches
      methods:
        - GET
        - POST
      strip_path: false
    - name: openai-files
      paths:
        - /ai/files
      methods:
        - GET
        - POST
        - DELETE
      strip_path: false

ai_models:
- name: gpt-5-4-chat
  alias: "@azure/gpt-5.4"
- name: gpt-realtime
  alias: "@azure/gpt-realtime"
- name: text-embedding-3-large
  alias: "@azure/text-embedding-3-large"
- name: gpt-image-1
  alias: "@azure/gpt-image-1"
- name: gpt-4o-mini-tts
  alias: "@azure/gpt-4o-mini-tts"
- name: whisper-1
  alias: "@azure/whisper-1"
- name: sora-2
  alias: "@azure/sora-2"
- name: openai-batch-api
  # alias omitted: batch API doesn't take a `model` field — per-request
  # models are embedded inside each line of the batch JSONL file.
- name: openai-files-api
  # alias omitted: files API doesn't take a `model` field at all.

plugins:
# ============================================================================
# ai-model-selector — extract model from request body for routes that take one
# ============================================================================
- name: ai-model-selector
  route:
    name: openai-chat
  config:
    source: body
    body_path: model
    max_request_body_size: 8388608

- name: ai-model-selector
  route:
    name: openai-responses
  config:
    source: body
    body_path: model
    max_request_body_size: 8388608

- name: ai-model-selector
  route:
    name: openai-realtime
  config:
    source: body
    body_path: model
    max_request_body_size: 1048576

- name: ai-model-selector
  route:
    name: openai-embeddings
  config:
    source: body
    body_path: model
    max_request_body_size: 4194304

- name: ai-model-selector
  route:
    name: openai-images
  config:
    source: body
    body_path: model
    max_request_body_size: 1048576

- name: ai-model-selector
  route:
    name: openai-audio-speech
  config:
    source: body
    body_path: model
    max_request_body_size: 1048576

- name: ai-model-selector
  route:
    name: openai-audio-transcribe
  config:
    source: body
    body_path: model
    max_request_body_size: 26214400

- name: ai-model-selector
  route:
    name: openai-audio-translate
  config:
    source: body
    body_path: model
    max_request_body_size: 26214400

- name: ai-model-selector
  route:
    name: openai-videos
  config:
    source: body
    body_path: model
    max_request_body_size: 1048576

# Note: no ai-model-selector on openai-batches or openai-files routes —
# neither endpoint accepts a `model` field in the request.

# ============================================================================
# ai-proxy-advanced — one per route, all targeting Azure AI Foundry
# ============================================================================

# ---- generate + agentic ----------------------------------------------------
- name: ai-proxy-advanced
  route:
    name: openai-chat
  config:
    balancer:
      algorithm: round-robin
    llm_format: openai
    genai_category: text/generation
    targets:
      - route_type: llm/v1/chat
        auth:
          header_name: api-key
          header_value: "{vault://ai/azure-openai-key}"
        model:
          provider: azure
          name: gpt-5-4
          model_alias: "@azure/gpt-5.4"
          options:
            azure_instance: kong-az-east
            azure_deployment_id: gpt-5-4
            azure_api_version: "2024-10-01-preview"
            max_tokens: 4096
            temperature: 1.0

- name: ai-proxy-advanced
  route:
    name: openai-responses
  config:
    balancer:
      algorithm: round-robin
    llm_format: openai
    genai_category: text/generation
    targets:
      - route_type: llm/v1/responses
        auth:
          header_name: api-key
          header_value: "{vault://ai/azure-openai-key}"
        model:
          provider: azure
          name: gpt-5-4
          model_alias: "@azure/gpt-5.4"
          options:
            azure_instance: kong-az-east
            azure_deployment_id: gpt-5-4
            azure_api_version: "2024-10-01-preview"
            max_tokens: 4096
            temperature: 1.0

