_format_version: "3.0"

services:
- name: ai-gateway
  url: http://ai-gateway.upstream.local
  routes:
    - name: hf-tgi-generate
      paths:
        - /ai/generate
      methods:
        - POST
      strip_path: false
    - name: hf-tgi-generate-stream
      paths:
        - /ai/generate_stream
      methods:
        - POST
      strip_path: false

ai-models:
- name: hf-llama-3-3-70b-tgi
  alias: "@huggingface/llama-3.3-70b-instruct"

# Note: no ai-model-selector plugins on either route — TGI deployments are
# single-model; the model is baked into the upstream URL, not the body.

plugins:
# ============================================================================
# ai-proxy-advanced — both TGI routes point at the same Hugging Face deployment
# ============================================================================
- name: ai-proxy-advanced
  route:
    name: hf-tgi-generate
  config:
    balancer:
      algorithm: round-robin
    llm_format: huggingface
    genai_category: text/generation
    targets:
      - route_type: llm/v1/chat
        auth:
          header_name: Authorization
          header_value: "Bearer {vault://ai/hf-token}"
        model:
          provider: huggingface
          name: meta-llama/Llama-3.3-70B-Instruct
          model_alias: "@huggingface/llama-3.3-70b-instruct"
          options:
            upstream_url: "https://kong-hf-tgi.huggingface.cloud"
            max_tokens: 4096
            temperature: 1.0

- name: ai-proxy-advanced
  route:
    name: hf-tgi-generate-stream
  config:
    balancer:
      algorithm: round-robin
    llm_format: huggingface
    genai_category: text/generation
    targets:
      - route_type: llm/v1/chat
        auth:
          header_name: Authorization
          header_value: "Bearer {vault://ai/hf-token}"
        model:
          provider: huggingface
          name: meta-llama/Llama-3.3-70B-Instruct
          model_alias: "@huggingface/llama-3.3-70b-instruct"
          options:
            upstream_url: "https://kong-hf-tgi.huggingface.cloud"
            max_tokens: 4096
            temperature: 1.0
