_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: semantic
        slots: 10000
      embeddings:
        auth:
          gcp_service_account_json: '{vault://ai/gcp-service-account-json}'
          gcp_use_service_account: true
        model:
          name: text-embedding-004
          options:
            gemini:
              api_endpoint: us-central1-aiplatform.googleapis.com
              location_id: us-central1
              project_id: my-project-id
            upstream_url: https://generativelanguage.googleapis.com
          provider: gemini
      genai_category: text/generation
      llm_format: openai
      targets:
        - description: gpt-4o
          model:
            name: gpt-4o
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
    model:
      name: semantic-lb
ai_models:
  - name: semantic-lb
    alias: semantic-lb
