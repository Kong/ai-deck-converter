_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route:
      name: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: gpt-5-2
            name: gpt-5.2
            provider: openai
          route_type: llm/v1/chat
    route:
      name: openai-chat
ai-models:
  - name: gpt-5-2
    alias: gpt-5-2
