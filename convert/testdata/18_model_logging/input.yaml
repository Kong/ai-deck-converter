models:
  # Model-level logging must be applied to each ai-proxy-advanced target as a
  # per-target logging record (log_statistics / log_payloads).
  - display_name: GPT-5.2
    name: gpt-5-2
    type: model
    enabled: true
    capabilities: [generate]
    formats:
      - type: openai
    config:
      route:
        paths: [/ai]
      logging:
        statistics: true
        payloads: false
    target_models:
      - name: gpt-5.2
        provider: openai-prod
        config:
          type: openai
    policies: []
    acls: {allow: [], deny: []}
providers:
  - name: openai-prod
    type: openai
    display_name: OpenAI Prod
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: "{vault://ai/openai-token}"
