# Four Bedrock models whose capabilities (embeddings/image/audio/video) all map
# to the shared /invoke endpoint -> one bedrock-invoke route with four targets.
providers:
  - name: bedrock-prod
    type: bedrock
    display_name: Bedrock Prod
    config:
      auth:
        type: aws
        access_key_id: "{vault://ai/aws-access-key-id}"
        secret_access_key: "{vault://ai/aws-secret-access-key}"
models:
  - display_name: Titan Embeddings
    name: titan-embed-text-v2
    type: model
    capabilities: [embeddings]
    formats: [{type: bedrock}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@bedrock/titan-embed-text-v2"}
    targets:
      - name: amazon.titan-embed-text-v2:0
        provider: bedrock-prod
        config: {type: bedrock, region: us-east-1, embeddings_normalize: true}
    policies: []
    access:
      acls: {allow: [], deny: []}
  - display_name: Nova Canvas
    name: nova-canvas-image
    type: model
    capabilities: [image]
    formats: [{type: bedrock}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@bedrock/nova-canvas"}
    targets:
      - name: amazon.nova-canvas-v1:0
        provider: bedrock-prod
        config: {type: bedrock, region: us-east-1}
    policies: []
    access:
      acls: {allow: [], deny: []}
  - display_name: Nova Sonic
    name: nova-sonic-audio
    type: model
    capabilities: [audio/speech]
    formats: [{type: bedrock}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@bedrock/nova-sonic"}
    targets:
      - name: amazon.nova-sonic-v1:0
        provider: bedrock-prod
        config: {type: bedrock, region: us-east-1}
    policies: []
    access:
      acls: {allow: [], deny: []}
  - display_name: Nova Reel
    name: nova-reel-video
    type: model
    capabilities: [video]
    formats: [{type: bedrock}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@bedrock/nova-reel"}
    targets:
      - name: amazon.nova-reel-v1:1
        provider: bedrock-prod
        config: {type: bedrock, region: us-east-1, video_output_s3_uri: "s3://kong/nova-reel/"}
    policies: []
    access:
      acls: {allow: [], deny: []}
