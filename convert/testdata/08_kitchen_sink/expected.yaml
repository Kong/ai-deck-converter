_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
  - name: tools-mcp
    url: https://tools.internal/mcp
    routes:
      - name: tools-mcp-route
        paths:
          - /mcp/tools
        plugins:
          - name: ai-mcp-proxy
            config:
              mode: passthrough-listener
              tools: []
  - name: orchestrator
    url: https://orchestrator.internal/a2a
    routes:
      - name: orch-route
        paths:
          - /agents/orch
        plugins:
          - name: ai-a2a-proxy
            config:
              logging:
                log_statistics: true
consumers:
  - username: app-svc
    groups:
      - premium
    keyauth_credentials:
      - key: app-secret
consumer_groups:
  - name: premium
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route:
      name: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: lowest-latency
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://env/openai-key}'
          description: gpt-4o
          model:
            model_alias: '@prod/prod-chat'
            name: gpt-4o
            options:
              temperature: 0.6
            provider: openai
          route_type: llm/v1/chat
          weight: 80
        - auth:
            header_name: x-api-key
            header_value: '{vault://env/anthropic-key}'
          description: claude-3-5
          model:
            model_alias: '@prod/prod-chat'
            name: claude-3-5
            options:
              anthropic_version: "2023-06-01"
            provider: anthropic
          route_type: llm/v1/chat
          weight: 20
    route:
      name: openai-chat
  - name: ai-prompt-guard
    config:
      allow_patterns:
        - ^safe
    model:
      name: prod-chat
  - name: acl
    config:
      allow:
        - premium
    model:
      name: prod-chat
vaults:
  - prefix: env-vault
    name: env
    config:
      prefix: KONG_
ai-models:
  - name: prod-chat
    alias: '@prod/prod-chat'
