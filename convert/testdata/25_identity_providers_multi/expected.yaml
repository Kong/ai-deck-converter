_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
consumers:
  - username: anonymous
    custom_id: anonymous
    plugins:
      - name: request-termination
        enabled: true
        config:
          message: Unauthorized
          status_code: 401
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.4
          model:
            model_alias: '@openai/gpt-5.4'
            name: gpt-5.4
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
    model: openai-gpt-5-4
  - name: openid-connect
    config:
      anonymous: anonymous
      issuer: https://dev-123456.okta.com/oauth2/default
    route: openai-chat
  - name: key-auth
    config:
      anonymous: anonymous
      key_names:
        - x-api-key
    route: openai-chat
ai_models:
  - name: openai-gpt-5-4
    alias: '@openai/gpt-5.4'
