_format_version: "3.0"
_transform: false
services:
  - id: 947a4e23-b483-5a65-8165-da9aed24565b
    name: ai-gateway
    url: http://ai-gateway.upstream.local
    host: ai-gateway.upstream.local
    port: 80
    protocol: http
routes:
  - id: 8ae36805-da7a-55b9-b056-72bde6bb937d
    name: openai-chat
    service:
      id: 947a4e23-b483-5a65-8165-da9aed24565b
    paths:
      - /oidc-repro/model-a/chat/completions
    methods:
      - POST
    protocols:
      - http
      - https
    strip_path: false
  - id: 2384fe9d-eacc-5ac2-ae4c-4752cc597f81
    name: openai-chat-2
    service:
      id: 947a4e23-b483-5a65-8165-da9aed24565b
    paths:
      - /oidc-repro/model-b/chat/completions
    methods:
      - POST
    protocols:
      - http
      - https
    strip_path: false
consumers:
  - id: 1e8d7140-b92a-52b9-9aa1-07931156b4bc
    username: anonymous
    custom_id: anonymous
plugins:
  - id: d39c1a27-9765-525d-a8f2-96c4a2435124
    name: request-termination
    enabled: true
    config:
      message: Unauthorized
      status_code: 401
    consumer:
      id: 1e8d7140-b92a-52b9-9aa1-07931156b4bc
  - id: 17fa8192-4b9f-5b5a-8379-20ad8bc836a7
    name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route:
      id: 8ae36805-da7a-55b9-b056-72bde6bb937d
  - id: f3adc007-171c-5519-8763-3a0eef79bde3
    name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://oidc-repro-secrets/openai-auth-token}'
          description: gpt-5-mini
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: '@oidc-repro/model-a'
            name: gpt-5-mini
            provider: openai
          route_type: llm/v1/chat
    route:
      id: 8ae36805-da7a-55b9-b056-72bde6bb937d
    model:
      id: f8ad1382-e6e4-5c95-86fd-ab9a0c84e2b4
  - id: fe4129f3-2075-5492-8b59-90def2cf73ab
    name: ai-proxy-advanced
