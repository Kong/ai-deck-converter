          description: gpt-5-mini
          logging:
            log_payloads: false
            log_statistics: true
          model:
            provider: openai
          route_type: llm/v1/chat
    route:
      id: 8ae36805-da7a-55b9-b056-72bde6bb937d
  - id: b7976da4-d8ec-5d03-8d6c-4e33dddb35db
    name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
