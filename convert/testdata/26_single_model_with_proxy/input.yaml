models:
  - display_name: GPT-5.2
    name: gpt-5-2
    type: model
    enabled: true
    capabilities: [generate]
    formats:
      - type: openai
    config:
      route:
        paths: [/ai]
        model:
          path_aliases: ["@openai/gpt-5.2"]
      proxy:
        auth:
          username: "king"
          password: "kong"
        http_proxy:
          host: "squid.corp"
          port: 3128
        https_proxy:
          host: "squid.corp"
          port: 3129
        proxy_scheme: "http"
      response_streaming: allow
    targets:
      - name: gpt-5.2
        provider: openai-prod
        config:
          type: openai
          temperature: 1.0
          max_tokens: 1024
    policies: []
    access:
      acls: {allow: [], deny: []}
model_providers:
  - name: openai-prod
    type: openai
    display_name: OpenAI Prod
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: "{vault://ai/openai-token}"
