_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: bedrock-invoke
        paths:
          - ~/ai/model/(?<model_name>[^/]+)/invoke(?:-with-response-stream)?
        methods:
          - GET
          - POST
        strip_path: false
plugins:
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: semantic
        slots: 10000
      embeddings:
        auth:
          aws_access_key_id: '{vault://ai/aws-access-key-id}'
          aws_secret_access_key: '{vault://ai/aws-secret-access-key}'
        model:
          name: text-embedding-ada-002
          options:
            bedrock:
              aws_region: us-east-1
          provider: bedrock
      genai_category: text/embeddings
      llm_format: bedrock
      targets:
        - auth:
            aws_access_key_id: '{vault://ai/aws-access-key-id}'
            aws_secret_access_key: '{vault://ai/aws-secret-access-key}'
          description: amazon.titan-embed-text-v2:0
          model:
            model_alias: '@bedrock/titan-embed-text-v2'
            name: amazon.titan-embed-text-v2:0
            options:
              bedrock:
                aws_region: us-east-1
                embeddings_normalize: true
            provider: bedrock
          route_type: llm/v1/embeddings
    route:
      name: bedrock-invoke
    model:
      name: titan-embed-text-v2
ai-models:
  - name: titan-embed-text-v2
    alias: '@bedrock/titan-embed-text-v2'
