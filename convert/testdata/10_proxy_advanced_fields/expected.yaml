_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/chat/completions
        methods:
          - POST
        strip_path: false
      - name: openai-embeddings
        paths:
          - /ai/embeddings
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      max_request_body_size: 2097152
      model_name_header: false
      response_streaming: deny
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-4o
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: full-model
            name: gpt-4o
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
    model: full-model
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      max_request_body_size: 2097152
      model_name_header: false
      response_streaming: deny
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-4o
          logging:
            log_payloads: false
            log_statistics: true
          model:
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-embeddings
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/embeddings
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: text-embedding-3-small
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: bare-model
            name: text-embedding-3-small
            provider: openai
          route_type: llm/v1/embeddings
    route: openai-embeddings
    model: bare-model
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/embeddings
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: text-embedding-3-small
          logging:
            log_payloads: false
            log_statistics: true
          model:
            provider: openai
          route_type: llm/v1/embeddings
    route: openai-embeddings
ai_models:
  - name: full-model
    alias: full-model
  - name: bare-model
    alias: bare-model
