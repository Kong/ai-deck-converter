# Two OpenAI-format chat models share one /ai/chat/completions route; the
# ai-proxy-advanced plugin gets one target per model (selected by alias).
providers:
  - name: openai-prod
    type: openai
    display_name: OpenAI Prod
    config:
      auth:
        type: basic
        headers: [{name: Authorization, value: "{vault://ai/openai-token}"}]
models:
  - display_name: GPT-5.2
    name: gpt-5-2
    type: model
    capabilities: [generate]
    formats: [{type: openai}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@openai/gpt-5.2"}
    target_models:
      - name: gpt-5.2
        provider: {name: openai-prod}
        config: {type: openai}
    policies: []
    acls: {allow: [], deny: []}
  - display_name: GPT-5.2 mini
    name: gpt-5-2-mini
    type: model
    capabilities: [generate]
    formats: [{type: openai}]
    config:
      route: {paths: [/ai]}
      model: {alias: "@openai/gpt-5.2-mini"}
    target_models:
      - name: gpt-5.2-mini
        provider: {name: openai-prod}
        config: {type: openai}
    policies: []
    acls: {allow: [], deny: []}
