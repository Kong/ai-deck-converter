_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-audio-transcribe
        paths:
          - /transcribev0/audio/transcriptions
        methods:
          - POST
        strip_path: false
      - name: openai-audio-transcribe-2
        paths:
          - /transcribev1/audio/transcriptions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-audio-transcribe
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: audio/transcription
      llm_format: openai
      response_streaming: allow
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-4o-transcribe
          logging:
            log_payloads: false
            log_statistics: false
          model:
            model_alias: '@openai/gpt-5.2'
            name: gpt-4o-transcribe
            options:
              max_tokens: 1024
              temperature: 1
            provider: openai
          route_type: audio/v1/audio/transcriptions
    route: openai-audio-transcribe
    model: gpt-5-2
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-audio-transcribe-2
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: audio/transcription
      llm_format: openai
      response_streaming: allow
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-4o-transcribe
          logging:
            log_payloads: false
            log_statistics: false
          model:
            model_alias: '@openai/gpt-5.2'
            name: gpt-4o-transcribe
            options:
              max_tokens: 1024
              temperature: 1
            provider: openai
          route_type: audio/v1/audio/transcriptions
    route: openai-audio-transcribe-2
    model: gpt-5-2.1
ai_models:
  - name: gpt-5-2
    alias: '@openai/gpt-5.2'
  - name: gpt-5-2.1
    alias: '@openai/gpt-5.2'
