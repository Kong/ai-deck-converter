models:
  - display_name: GPT-5.2
    name: gpt-5-2
    type: model
    enabled: true
    capabilities: [audio/transcription]
    formats:
      - type: openai
    config:
      route:
        paths: [/transcribev0]
        model:
          path_aliases: ["@openai/gpt-5.2"]
      response_streaming: allow
    targets:
      - name: gpt-4o-transcribe
        provider: openai-prod
        config:
          type: openai
          temperature: 1.0
          max_tokens: 1024
    policies: []
    access:
      acls: {allow: [], deny: []}
  - display_name: GPT-5.2.1
    name: gpt-5-2.1
    type: model
    enabled: true
    capabilities: [audio/transcription]
    formats:
      - type: openai
    config:
      route:
        paths: [/transcribev1]
        model:
          path_aliases: ["@openai/gpt-5.2"]
      response_streaming: allow
    targets:
      - name: gpt-4o-transcribe
        provider: openai-prod
        config:
          type: openai
          temperature: 1.0
          max_tokens: 1024
    policies: []
    access:
      acls: {allow: [], deny: []}
model_providers:
  - name: openai-prod
    type: openai
    display_name: OpenAI Prod
    config:
      auth:
        type: basic
        headers:
          - name: Authorization
            value: "{vault://ai/openai-token}"
