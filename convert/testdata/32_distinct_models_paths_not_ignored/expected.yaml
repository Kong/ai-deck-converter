_format_version: "3.0"
services:
  - name: ai-gateway
    url: http://ai-gateway.upstream.local
    routes:
      - name: openai-chat
        paths:
          - /ai/a/chat/completions
        methods:
          - POST
        strip_path: false
      - name: openai-chat-2
        paths:
          - /ai/b/chat/completions
        methods:
          - POST
        strip_path: false
plugins:
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2-a
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: '@openai/gpt-5.2-a'
            name: gpt-5.2-a
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
    model: gpt-5-2-a
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2-a
          logging:
            log_payloads: false
            log_statistics: true
          model:
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat
  - name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route: openai-chat-2
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2-b
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: '@openai/gpt-5.2-b'
            name: gpt-5.2-b
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat-2
    model: gpt-5-2-b
  - name: ai-proxy-advanced
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - auth:
            header_name: Authorization
            header_value: '{vault://ai/openai-token}'
          description: gpt-5.2-b
          logging:
            log_payloads: false
            log_statistics: true
          model:
            provider: openai
          route_type: llm/v1/chat
    route: openai-chat-2
ai_models:
  - name: gpt-5-2-a
    alias: '@openai/gpt-5.2-a'
  - name: gpt-5-2-b
    alias: '@openai/gpt-5.2-b'
