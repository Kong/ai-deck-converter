models:
  - type: model
    display_name: Claude on Bedrock
    name: claude-bedrock
    capabilities: [generate]
    formats:
      - type: bedrock
    target_models:
      - name: anthropic.claude-3-5-sonnet
        provider: bedrock-prod
        config:
          type: bedrock
          max_tokens: 1024
          aws_region: us-east-1
    policies: []
    acls: {allow: [], deny: []}
    config:
      route:
        paths: [/ai]
      model:
        alias: "@bedrock/claude-3-5-sonnet"
providers:
  - type: bedrock
    display_name: Bedrock Prod
    name: bedrock-prod
    config:
      auth:
        type: aws
        access_key_id: "{vault://env/aws-key-id}"
        secret_access_key: "{vault://env/aws-secret}"
        assume_role_arn: "arn:aws:iam::123:role/bedrock"
        role_session_name: kong-session
