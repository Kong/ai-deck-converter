_format_version: "3.0"
_transform: false
services:
  - id: 947a4e23-b483-5a65-8165-da9aed24565b
    name: ai-gateway
    url: http://ai-gateway.upstream.local
    host: ai-gateway.upstream.local
    port: 80
    protocol: http
routes:
  - id: 1a3f650c-2709-5e79-a792-7ffd18243fbf
    name: openai-responses
    service:
      id: 947a4e23-b483-5a65-8165-da9aed24565b
    paths:
      - /disabled-chat/responses
    methods:
      - POST
    protocols:
      - http
      - https
    strip_path: false
  - id: 8ae36805-da7a-55b9-b056-72bde6bb937d
    name: openai-chat
    service:
      id: 947a4e23-b483-5a65-8165-da9aed24565b
    paths:
      - /disabled-chat/chat/completions
    methods:
      - POST
    protocols:
      - http
      - https
    strip_path: false
  - id: 67276980-b7e0-58ee-8c51-bafe739db8f8
    name: openai-images
    service:
      id: 947a4e23-b483-5a65-8165-da9aed24565b
    paths:
      - /disabled-chat/images/generations
    methods:
      - POST
    protocols:
      - http
      - https
    strip_path: false
plugins:
  - id: 17fa8192-4b9f-5b5a-8379-20ad8bc836a7
    name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route:
      id: 1a3f650c-2709-5e79-a792-7ffd18243fbf
  - id: f3adc007-171c-5519-8763-3a0eef79bde3
    name: ai-proxy-advanced
    enabled: false
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - description: gpt-5
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: disabled-chat
            name: gpt-5
            provider: openai
          route_type: llm/v1/responses
    route:
      id: 1a3f650c-2709-5e79-a792-7ffd18243fbf
    model:
      id: bbb56cd5-695a-5c11-815a-c5da6deceeca
  - id: dcebfb31-cc0f-5469-b6d7-9d8807a4e8d2
    name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
      source: body
    route:
      id: 8ae36805-da7a-55b9-b056-72bde6bb937d
  - id: 75ff22ed-6245-594b-895f-6a9fa36f4581
    name: ai-proxy-advanced
    enabled: false
    config:
      balancer:
        algorithm: round-robin
      genai_category: text/generation
      llm_format: openai
      targets:
        - description: gpt-5
          logging:
            log_payloads: false
            log_statistics: true
          model:
            model_alias: disabled-chat
            name: gpt-5
            provider: openai
          route_type: llm/v1/chat
    route:
      id: 8ae36805-da7a-55b9-b056-72bde6bb937d
    model:
      id: bbb56cd5-695a-5c11-815a-c5da6deceeca
  - id: 5477cac7-3c38-581b-899b-f9d520e9d5e4
    name: ai-model-selector
    config:
      body_path: model
      max_request_body_size: 8388608
