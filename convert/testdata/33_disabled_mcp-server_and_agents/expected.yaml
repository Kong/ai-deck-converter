_format_version: "3.0"
services:
  - name: flights-mcp
    host: localhost
    enabled: false
    routes:
      - name: flights-mcp-route
        paths:
          - /mcp/flights
        plugins:
          - name: ai-mcp-proxy
            config:
              default_acl:
                - allow:
                    - premium
              include_consumer_groups: true
              logging:
                log_audits: true
                log_payloads: false
                log_statistics: true
              max_request_body_size: 8388608
              mode: conversion-listener
              proxy_config:
                auth_password: kong
                auth_username: king
                http_proxy_host: squid.corp
                http_proxy_port: 3128
                https_proxy_host: squid.corp
                https_proxy_port: 3129
                proxy_scheme: http
              server:
                forward_client_headers: true
                timeout: 10000
              tools:
                - description: Search available flights
                  host: flights.internal
                  method: GET
                  name: searchFlights
                  path: /flights
                  scheme: https
                - acl:
                    allow:
                      - agents
                  description: Book a flight
                  method: POST
                  name: bookFlight
                  path: /flights/book
  - name: booking-agent
    url: https://booking-agent.internal:8443/a2a
    enabled: false
    routes:
      - name: booking-route
        paths:
          - /agents/booking
        methods:
          - POST
        plugins:
          - name: ai-a2a-proxy
            config:
              logging:
                log_payloads: false
                log_statistics: true
                max_payload_size: 524288
              max_request_body_size: 1048576
