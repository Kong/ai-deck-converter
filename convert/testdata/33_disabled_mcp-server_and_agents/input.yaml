agents:
  - type: a2a
    display_name: Booking Agent
    name: booking-agent
    enabled: false
    policies: []
    access:
      acls: {allow: [], deny: []}
    config:
      url: https://booking-agent.internal:8443/a2a
      route: {name: booking-route, paths: [/agents/booking], methods: [POST]}
      max_request_body_size: 1048576
      logging: {statistics: true, payloads: false, max_payload_size: 524288}
mcp_servers:
  - type: conversion-listener
    enabled: false
    display_name: Flights MCP
    name: flights-mcp
    policies: []
    access:
      acls: {allow: [], deny: []}
      default_tool_acls: {allow: [premium], deny: []}
    config:
      route: {name: flights-mcp-route, paths: [/mcp/flights]}
      max_request_body_size: 8388608
      logging: {statistics: true, audits: true}
      server: {timeout: 10000, forward_client_headers: true}
      proxy:
        auth:
          username: "king"
          password: "kong"
        http_proxy:
          host: "squid.corp"
          port: 3128
        https_proxy:
          host: "squid.corp"
          port: 3129
        proxy_scheme: "http"
    tools:
      - name: searchFlights
        description: Search available flights
        method: GET
        path: /flights
        scheme: https
        host: flights.internal
      - name: bookFlight
        description: Book a flight
        method: POST
        path: /flights/book
        access:
          acls: {allow: [agents], deny: []}
policies:
  - type: key-auth
    name: require-key
    config: {key_names: [apikey]}
    enabled: false