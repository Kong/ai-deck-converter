_format_version: "3.0"
services:
  - name: github-mcp
    host: localhost
    routes:
      - name: github-mcp-route
        paths:
          - /github-mcp
        plugins:
          - name: ai-mcp-proxy
            config:
              mode: passthrough
  - name: flights-mcp
    host: localhost
    routes:
      - name: flights-mcp-route
        paths:
          - /flights-mcp
        plugins:
          - name: ai-mcp-proxy
            config:
              mode: conversion-listener
              tools:
                - annotations:
                    title: Get KongAir planned flights
                  description: Get KongAir planned flights
                  method: GET
                  name: ""
                  parameters:
                    - description: Filter by date (defaults to current day)
                      in: query
                      name: date
                      required: false
                      schema:
                        type: string
                  path: /flights
                - annotations:
                    title: Get a specific flight by flight number
                  description: Get a specific flight by flight number
                  method: GET
                  name: ""
                  parameters:
                    - description: The flight number
                      in: path
                      name: flightNumber
                      required: true
                      schema:
                        type: string
                  path: /flights/{flightNumber}
                - annotations:
                    title: Fetch more details about a flight
                  description: Fetch more details about a flight
                  method: GET
                  name: ""
                  parameters:
                    - description: The flight number
                      in: path
                      name: flightNumber
                      required: true
                      schema:
                        type: string
                  path: /flights/{flightNumber}/details
